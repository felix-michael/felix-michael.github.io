<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Felix — Mechanical Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --red: #C8102E;
            --navy: #1a2340;
            --navy-light: #243052;
            --cream: #f8f5f0;
            --text: #1e1e1e;
            --muted: #6b7280;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: var(--cream);
            margin: 0;
        }

        h1, h2, h3 {
            font-family: 'DM Serif Display', serif;
        }

        .hero-bg {
            background-color: var(--navy);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(200,16,46,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(100,130,200,0.1) 0%, transparent 50%),
                url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(255,255,255,0.03)' stroke-width='1'%3E%3Cpath d='M40 0 L80 40 L40 80 L0 40 Z'/%3E%3C/g%3E%3C/svg%3E");
            background-size: cover, cover, 80px 80px;
        }

        .section-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--red);
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: var(--red);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            transition: background 0.2s, transform 0.15s;
            border: none;
            cursor: pointer;
        }
        .btn-primary:hover { background: #a50d25; transform: translateY(-1px); }

        .btn-ghost {
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border: 1.5px solid rgba(255,255,255,0.3);
            transition: border-color 0.2s, background 0.2s, transform 0.15s;
            cursor: pointer;
            background: transparent;
        }
        .btn-ghost:hover { border-color: white; background: rgba(255,255,255,0.08); transform: translateY(-1px); }

        .skill-tag {
            background: #f0f4ff;
            color: #2d4a8a;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .badge {
            background: #fff0f2;
            color: var(--red);
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge-navy {
            background: #eef1f8;
            color: var(--navy);
            padding: 0.2rem 0.7rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
            margin: 0;
        }

        .expand-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid #e5e7eb;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .expand-btn:hover { background: #f3f4f6; border-color: #9ca3af; }

        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(26, 35, 64, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .nav-link {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.15s;
            background: none;
            border: none;
            padding: 0;
        }
        .nav-link:hover { color: white; }

        .result-callout {
            background: linear-gradient(135deg, #f0f9ff, #e8f4fd);
            border-left: 3px solid #3b82f6;
            border-radius: 0 8px 8px 0;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #1e40af;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-up { animation: fadeUp 0.6s ease forwards; }
        .delay-1 { animation-delay: 0.1s; opacity: 0; }
        .delay-2 { animation-delay: 0.25s; opacity: 0; }
        .delay-3 { animation-delay: 0.4s; opacity: 0; }
        .delay-4 { animation-delay: 0.55s; opacity: 0; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) translateX(-50%); }
            50% { transform: translateY(-8px) translateX(-50%); }
        }
        .bounce { animation: bounce 2s ease-in-out infinite; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function Portfolio() {
            const [expandedProject, setExpandedProject] = useState(null);

            const scrollTo = (id) => {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
            };

            const projects = [
                {
                    id: 1,
                    title: "Master's Thesis: Hybrid Gyroid-Diamond TPMS Structures with PCM",
                    subtitle: "3D-Printed Metal Lattice Design, Fabrication & Experimental Validation",
                    date: "2025–2026",
                    category: "Graduate Research",
                    badge: "Completed — May 2026",
                    description: "Designed, fabricated, and experimentally tested a hybrid Gyroid–Diamond TPMS lattice infiltrated with Paraplast paraffin wax for passive thermal management applications including EV battery cooling and electronics thermal regulation.",
                    highlights: [
                        "Designed hybrid geometry alternating between Gyroid and Diamond topology across 8 bands along a curved S-shaped centerline using implicit level-set equations in MATLAB",
                        "Fabricated three 316L stainless steel samples at 25%, 35%, and 45% relative density via metal paste deposition (MPD) additive manufacturing",
                        "Instrumented each sample with three Type-J thermocouples (inlet, midpoint, outlet) and logged thermal response via Omega portable data logger",
                        "D25 and D35 samples showed lower-density lattice delivers heat to surrounding wax faster — conduction surface area to PCM volume ratio favors lower densities in the range tested",
                        "D45 sample compromised by fabrication defect (incomplete lattice consolidation), demonstrating manufacturing quality is as critical as geometric design",
                        "Contributed a methodology for hybrid TPMS design along non-linear paths and a benchmark for future graded/geometry-tuned thermal storage elements"
                    ],
                    skills: ["MATLAB", "TPMS Lattice Design", "Metal 3D Printing (MPD)", "Thermal Instrumentation", "SolidWorks", "STL Generation", "Heat Transfer", "PCM Systems"],
                    resultCallout: "Key Finding: Lower-density lattices (25–35%) outperformed the higher-density sample in PCM heat distribution — a counterintuitive result driven by the surface-area-to-PCM-volume ratio."
                },
                {
                    id: 2,
                    title: "Scorecard: The Sports Diary",
                    subtitle: "iOS App — Live on the Apple App Store",
                    date: "2026–Present",
                    category: "Software / Product",
                    badge: "Live on App Store",
                    description: "Developed and shipped a full-stack iOS app in the style of Letterboxd, allowing users to rate and review sports games with a social feed. Built solo from concept to launch.",
                    highlights: [
                        "Built with React Native for cross-platform iOS development",
                        "Supabase backend for real-time data, user authentication, and social feed",
                        "Integrated live sports data APIs for game results across major leagues",
                        "Implemented user rating system, personal diary, and social follow/feed features",
                        "Designed app icon and UI with dark background, mint green accent, clean minimal aesthetic",
                        "Managed full product lifecycle: design, development, App Store submission, and release"
                    ],
                    skills: ["React Native", "Supabase", "iOS Development", "REST APIs", "UI/UX Design", "App Store Connect"]
                },
                {
                    id: 3,
                    title: "Award-Winning Senior Design: ECM Micro-Orifice Deburring System",
                    subtitle: "Best Senior Design Project — O'Keefe Controls × Fairfield University",
                    date: "Sep 2024 – May 2025",
                    category: "Capstone Project",
                    badge: "Best Senior Design Award",
                    description: "Industry-sponsored automated precision manufacturing system for electrochemical machining (ECM) deburring of micro-orifices, achieving sub-micron edge accuracy down to 0.001 in.",
                    highlights: [
                        "Won Best Senior Design Project award — selected from all engineering disciplines",
                        "Automated needle positioning system with stepper motor and Arduino control",
                        "Established validated process-parameter window for sub-0.001 in. edge accuracy",
                        "Structured test plan execution across multiple prototype iterations, improving flow consistency",
                        "Full technical documentation, DFM reviews, and sponsor presentations"
                    ],
                    skills: ["ECM", "Arduino", "GD&T", "DFM", "Process Optimization", "Technical Documentation", "Precision Manufacturing"],
                    document: "senior-design-poster.pdf"
                },
                {
                    id: 4,
                    title: "Thermal Performance Optimization — Custom Heat Sink Design",
                    subtitle: "ANSYS Simulation & 3D Printing Design Competition",
                    date: "2024",
                    category: "Research & Design Competition",
                    description: "Comparative study of novel heat sink geometries using SolidWorks modeling, ANSYS simulations, and physical testing. Optimized for both free and forced convection performance.",
                    highlights: [
                        "Designed honeycomb geometry with compartmentalized fluid flow channels",
                        "Best forced convection cooling performance in cohort: 31.9 seconds",
                        "ANSYS thermal simulation validated against experimental results",
                        "3D-printed copper-PLA composite heat sink prototypes",
                        "Balanced performance across free and forced convection regimes"
                    ],
                    skills: ["ANSYS", "SolidWorks", "Thermal Analysis", "3D Printing", "Design Optimization", "CFD"],
                    document: "heat-sink-project-poster.pdf"
                },
                {
                    id: 5,
                    title: "Convective Heat Transfer Coefficient Study",
                    subtitle: "Forced Convection Lab Report — Example Technical Writing",
                    date: "Fall 2024",
                    category: "Laboratory Research",
                    description: "Experimental investigation of air velocity effects on heat transfer efficiency in forced convection systems, with direct application to heat exchanger design.",
                    highlights: [
                        "Measured convective coefficients from 11.84 to 19.85 W/m²°C across velocity range",
                        "Analyzed 0–1.5 m/s velocity effects on thermal performance",
                        "67% improvement in heat transfer over free convection baseline",
                        "Temperature reduction from 47.1°C to 28.1°C under forced flow",
                        "Full experimental setup, uncertainty analysis, and MATLAB post-processing"
                    ],
                    skills: ["Heat Transfer", "Experimental Design", "Data Analysis", "MATLAB", "Technical Writing"],
                    document: "heat-transfer-lab-report.pdf"
                }
            ];

            const skills = {
                "Design & Simulation": ["SolidWorks (CSWA)", "Inventor", "AutoCAD", "ANSYS", "MATLAB", "GD&T", "DFM"],
                "Additive Manufacturing": ["FDM / 3D Printing", "Metal Paste Deposition (MPD)", "STL Generation", "TPMS Lattice Design", "PrusaSlicer"],
                "Controls & Programming": ["Python", "Arduino", "LabVIEW", "React Native", "Supabase"],
                "Thermal Engineering": ["Heat Transfer Analysis", "PCM Thermal Storage", "TPMS Heat Sinks", "Thermocouple Instrumentation", "Battery Thermal Management"]
            };

            const experience = [
                {
                    title: "Graduate Research Assistant — Thermal Management Lab",
                    company: "Fairfield University",
                    date: "May 2025 – May 2026",
                    bullets: [
                        "Designed and validated 3D-printed PCM/TPMS heat sinks using MATLAB geometry generation and ANSYS simulation",
                        "Conducted experimental thermal testing with thermocouple instrumentation and Omega data loggers",
                        "Fabricated 316L stainless steel TPMS samples via metal paste deposition at three relative densities (25%, 35%, 45%)"
                    ]
                },
                {
                    title: "Graduate Teaching Assistant — Senior Design",
                    company: "Fairfield University",
                    date: "Aug 2025 – May 2026",
                    bullets: [
                        "Conducted CAD/DFM reviews and advised student teams on test planning and technical documentation",
                        "Coordinated 3D printing logistics and facilitated industry mentor sessions for capstone teams"
                    ]
                },
                {
                    title: "Inspection Engineering Assistant",
                    company: "Teamworks Real Estate Inspections, Paramus, NJ",
                    date: "May 2024 – Aug 2024",
                    bullets: [
                        "Assessed mechanical, structural, and HVAC systems for engineering evaluation and compliance",
                        "Produced CAD-based reports documenting system conditions and deficiencies",
                        "Assisted property evaluations using drone and aerial technology"
                    ]
                },
                {
                    title: "Assistant Head of Outdoor Golf Operations",
                    company: "Spring Brook Country Club, Morristown, NJ",
                    date: "May 2021 – Present",
                    bullets: [
                        "Supervised daily operations, trained new staff on SOPs and service standards",
                        "Resolved member issues through clear communication and problem solving"
                    ]
                }
            ];

            return (
                <div style={{ background: 'var(--cream)' }}>
                    {/* NAV */}
                    <nav className="nav">
                        <span style={{ fontFamily: 'DM Serif Display, serif', color: 'white', fontSize: '1.1rem' }}>
                            Michael Felix
                        </span>
                        <div style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                            {['About', 'Projects', 'Skills', 'Experience', 'Contact'].map(s => (
                                <button key={s} className="nav-link" onClick={() => scrollTo(s.toLowerCase())}>
                                    {s}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* HERO */}
                    <section className="hero-bg" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative', paddingTop: '4rem' }}>
                        <div style={{ textAlign: 'center', color: 'white', padding: '2rem' }}>
                            <p className="section-label fade-up delay-1" style={{ color: 'rgba(200,16,46,0.9)', marginBottom: '1.25rem' }}>
                                Mechanical Engineer · MSME · Fairfield University
                            </p>
                            <h1 className="fade-up delay-2" style={{ fontSize: 'clamp(3rem, 8vw, 5.5rem)', lineHeight: 1.05, marginBottom: '0.75rem', fontWeight: 400 }}>
                                Michael Felix
                            </h1>
                            <p className="fade-up delay-3" style={{ color: 'rgba(255,255,255,0.6)', fontSize: '1.1rem', marginBottom: '2.5rem', fontFamily: 'DM Sans', maxWidth: '560px', margin: '0 auto 2.5rem' }}>
                                Thermal systems, additive manufacturing, and precision engineering — from simulation to physical validation.
                            </p>
                            <div className="fade-up delay-4" style={{ display: 'flex', flexWrap: 'wrap', gap: '0.75rem', justifyContent: 'center' }}>
                                <button className="btn-primary" onClick={() => scrollTo('projects')}>
                                    View Projects
                                </button>
                                <a className="btn-ghost" href="documents/resume.pdf" download>
                                    ↓ Resume
                                </a>
                                <a className="btn-ghost" href="https://www.linkedin.com/in/michael-felix-b35b8a231/" target="_blank" rel="noopener noreferrer">
                                    LinkedIn
                                </a>
                                <button className="btn-ghost" onClick={() => scrollTo('contact')}>
                                    Contact
                                </button>
                            </div>
                        </div>
                        <div className="bounce" style={{ position: 'absolute', bottom: '2rem', left: '50%' }}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2">
                                <path d="M19 9l-7 7-7-7"/>
                            </svg>
                        </div>
                    </section>

                    {/* ABOUT */}
                    <section id="about" style={{ background: 'white', padding: '5rem 1.5rem' }}>
                        <div style={{ maxWidth: '900px', margin: '0 auto' }}>
                            <p className="section-label" style={{ marginBottom: '0.75rem' }}>About</p>
                            <h2 style={{ fontSize: '2.25rem', marginBottom: '1.5rem', fontWeight: 400 }}>
                                Engineer. Builder. Researcher.
                            </h2>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
                                <p style={{ color: '#4b5563', lineHeight: '1.8', fontSize: '0.975rem' }}>
                                    I'm a mechanical engineer completing my MSME at Fairfield University in May 2026, with a thesis on 3D-printed hybrid TPMS lattice structures embedded in phase change materials for passive thermal management. My work spans the full cycle from mathematical geometry generation in MATLAB to fabrication and experimental validation.
                                </p>
                                <p style={{ color: '#4b5563', lineHeight: '1.8', fontSize: '0.975rem' }}>
                                    Outside the lab, I built and shipped an iOS app (Scorecard) from scratch — handling product design, full-stack development, and App Store deployment solo. I'm drawn to problems that require both rigorous analysis and hands-on execution, and I'm targeting roles in defense and aerospace in the Northeast.
                                </p>
                            </div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1.5rem', marginTop: '2rem', paddingTop: '1.5rem', borderTop: '1px solid #f3f4f6', color: '#6b7280', fontSize: '0.875rem' }}>
                                <span>📍 Morris Plains, NJ</span>
                                <a href="mailto:michaelefelix.25@gmail.com" style={{ color: '#6b7280', textDecoration: 'none' }}>✉️ michaelefelix.25@gmail.com</a>
                                <a href="tel:973-462-7097" style={{ color: '#6b7280', textDecoration: 'none' }}>📞 973-462-7097</a>
                                <a href="https://felix-michael.github.io" style={{ color: '#6b7280', textDecoration: 'none' }}>🔗 felix-michael.github.io</a>
                            </div>

                            {/* Education inline */}
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginTop: '2.5rem' }}>
                                {[
                                    {
                                        degree: "M.S. Mechanical Engineering",
                                        school: "Fairfield University",
                                        date: "Class of 2026",
                                        detail: "Thesis: Hybrid TPMS/PCM heat sinks for EV battery thermal management",
                                        honors: []
                                    },
                                    {
                                        degree: "B.S. Mechanical Engineering",
                                        school: "Fairfield University · Minor: Mathematics",
                                        date: "Class of 2025",
                                        detail: "GPA: 3.67 Overall · 3.68 Major · Study Abroad: Galway, Ireland",
                                        honors: ["Tau Beta Pi", "Cum Laude"]
                                    }
                                ].map((ed, i) => (
                                    <div key={i} className="card" style={{ padding: '1.25rem' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '0.4rem' }}>
                                            <h3 style={{ fontSize: '1rem', fontFamily: 'DM Sans', fontWeight: 600, margin: 0 }}>{ed.degree}</h3>
                                            <span style={{ color: 'var(--muted)', fontSize: '0.8rem', whiteSpace: 'nowrap', marginLeft: '0.5rem' }}>{ed.date}</span>
                                        </div>
                                        <p style={{ color: 'var(--muted)', fontSize: '0.85rem', margin: '0 0 0.5rem' }}>{ed.school}</p>
                                        <p style={{ color: '#4b5563', fontSize: '0.8rem', margin: '0 0 0.5rem' }}>{ed.detail}</p>
                                        <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap' }}>
                                            {ed.honors.map(h => <span key={h} className="badge-navy">{h}</span>)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <div className="divider" />

                    {/* PROJECTS */}
                    <section id="projects" style={{ padding: '5rem 1.5rem', background: 'var(--cream)' }}>
                        <div style={{ maxWidth: '900px', margin: '0 auto' }}>
                            <p className="section-label" style={{ marginBottom: '0.75rem' }}>Portfolio</p>
                            <h2 style={{ fontSize: '2.25rem', marginBottom: '2.5rem', fontWeight: 400 }}>Engineering Projects</h2>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                                {projects.map((project) => (
                                    <div key={project.id} className="card" style={{ overflow: 'hidden' }}>
                                        <div
                                            style={{ padding: '1.4rem 1.5rem', cursor: 'pointer', display: 'flex', gap: '1rem', alignItems: 'flex-start' }}
                                            onClick={() => setExpandedProject(expandedProject === project.id ? null : project.id)}
                                        >
                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: '0.5rem', alignItems: 'center' }}>
                                                    <span className="badge-navy">{project.category}</span>
                                                    {project.badge && <span className="badge">{project.badge}</span>}
                                                    <span style={{ color: 'var(--muted)', fontSize: '0.8rem', marginLeft: 'auto' }}>{project.date}</span>
                                                </div>
                                                <h3 style={{ fontSize: '1.05rem', fontFamily: 'DM Sans', fontWeight: 600, margin: '0 0 0.2rem' }}>{project.title}</h3>
                                                <p style={{ color: 'var(--muted)', fontSize: '0.875rem', margin: '0 0 0.6rem', fontStyle: 'italic' }}>{project.subtitle}</p>
                                                <p style={{ color: '#4b5563', fontSize: '0.875rem', margin: 0, lineHeight: 1.6 }}>{project.description}</p>
                                            </div>
                                            <div className="expand-btn">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"
                                                    style={{ transform: expandedProject === project.id ? 'rotate(180deg)' : 'rotate(0)', transition: 'transform 0.2s' }}>
                                                    <path d="M19 9l-7 7-7-7"/>
                                                </svg>
                                            </div>
                                        </div>

                                        {expandedProject === project.id && (
                                            <div style={{ padding: '0 1.5rem 1.5rem', borderTop: '1px solid #f3f4f6' }}>
                                                {project.resultCallout && (
                                                    <div className="result-callout" style={{ margin: '1.25rem 0 1rem' }}>
                                                        <strong>Result:</strong> {project.resultCallout.replace('Key Finding: ', '')}
                                                    </div>
                                                )}
                                                <h4 style={{ fontFamily: 'DM Sans', fontWeight: 600, fontSize: '0.875rem', marginTop: project.resultCallout ? '0' : '1.25rem', marginBottom: '0.6rem', color: '#374151' }}>Key Highlights</h4>
                                                <ul style={{ margin: '0 0 1.25rem', padding: 0, listStyle: 'none' }}>
                                                    {project.highlights.map((h, idx) => (
                                                        <li key={idx} style={{ display: 'flex', gap: '0.5rem', marginBottom: '0.4rem', fontSize: '0.875rem', color: '#4b5563', lineHeight: 1.5 }}>
                                                            <span style={{ color: 'var(--red)', marginTop: '0.1rem', flexShrink: 0 }}>—</span>
                                                            {h}
                                                        </li>
                                                    ))}
                                                </ul>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginBottom: project.document ? '1rem' : '0' }}>
                                                    {project.skills.map((s, idx) => (
                                                        <span key={idx} className="skill-tag">{s}</span>
                                                    ))}
                                                </div>
                                                {project.document && (
                                                    <a href={`documents/${project.document}`} download className="btn-primary" style={{ marginTop: '1rem', fontSize: '0.85rem' }}>
                                                        ↓ Download Documentation
                                                    </a>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <div className="divider" />
